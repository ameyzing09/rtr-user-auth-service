version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: recrutr_auth_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: recrutr_auth
      MYSQL_USER: recrutr_user
      MYSQL_PASSWORD: recrutr_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - recrutr_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recrutr_auth_service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database Configuration
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: recrutr_auth
      DB_USER: recrutr_user
      DB_PASSWORD: recrutr_password
      
      # JWT Configuration
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production-32chars
      JWT_EXPIRY: 24h
      JWT_REFRESH_EXPIRY: 168h
      
      # Server Configuration
      PORT: 8080
      GIN_MODE: release
      
      # CORS Configuration
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - recrutr_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Adminer (Database Management UI)
  adminer:
    image: adminer:latest
    container_name: recrutr_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql
    networks:
      - recrutr_network

volumes:
  mysql_data:
    driver: local

networks:
  recrutr_network:
    driver: bridge